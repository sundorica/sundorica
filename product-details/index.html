        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Your existing functions (stripHtml, showToast, updateCartCount, createMenuItems, renderSocialLinks, etc.)

        // PASTE YOUR EXISTING JAVASCRIPT FUNCTIONS HERE...

        // IMPORTANT: The original 'renderProductDetails' and 'addProductSchema' functions are no longer
        // needed for the initial page load as the content is now pre-rendered.
        // The JavaScript is now mainly for interactivity.
        // We still need the 'loadProductDetails' function to get the data and attach event listeners.

        // You would keep your `addProductDetailsEventListeners` function exactly as it is.
        // And other event listener setup functions.

        async function loadProductDetailsForInteractivity() {
            try {
                const path = window.location.pathname;
                const pathSegments = path.split('/');
                const lastSegment = pathSegments[pathSegments.length - 1];

                // Check if the last segment is not empty and has a length of at least 20
                if (!lastSegment || lastSegment.length < 20) {
                    throw new Error("Invalid product slug or ID in URL.");
                }

                // Firestore IDs are 20 characters long. We extract it from the end of the slug.
                const productId = lastSegment.slice(-20);
                
                if (!productId) throw new Error("Product ID not found in URL.");
                
                const productDoc = await getDoc(doc(db, "products", productId));
                if (productDoc.exists()) {
                    const productData = { id: productDoc.id, ...productDoc.data() };
                    
                    if (productData.sizeChartId) {
                        const sizeChartDoc = await getDoc(doc(db, "pages", productData.sizeChartId));
                        if (sizeChartDoc.exists()) {
                            productData.sizeChartContent = sizeChartDoc.data().content;
                        }
                    }
                    
                    // The HTML is already there, we just need to make it interactive.
                    // This function will handle clicks on variants, add to cart, etc.
                    addProductDetailsEventListeners(productData); 
                }
            } catch (error) {
                console.error("Error attaching interactivity:", error);
            }
        }

        // Keep all your other functions like addProductDetailsEventListeners, loadSharedComponents, etc.
        // ... PASTE THEM HERE ...

        document.addEventListener("DOMContentLoaded", (async () => {
            document.getElementById("copyright-year").textContent = (new Date).getFullYear();
            // The main content is pre-rendered, so we load shared components
            // and then attach interactivity to the existing product details.
            await loadSharedComponents();
            await loadProductDetailsForInteractivity(); // This function attaches event listeners
            document.querySelector(".main-footer").style.display = "block";
            addMenuEventListeners();
            setupEventListeners();
            updateCartCount();
        }));
    </script>
