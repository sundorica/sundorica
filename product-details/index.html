            window.removeEventListener('mousedown', loadMetaPixel, { passive: true });

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBKK4FmXtcMniVv6_5-mFPBJICwEM5Dkzc", authDomain: "nasir-9102c.firebaseapp.com", projectId: "nasir-9102c", storageBucket: "nasir-9102c.firebasestorage.app", messagingSenderId: "182224792140", appId: "1:182224792140:web:42348e8b24f94cdf07e2e9", measurementId: "G-8R5J241MJM" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Core Functions ---
        function showToast(message, type = "success") { const container = document.getElementById("toast-container"); if (!container) return; const toast = document.createElement("div"); toast.className = `toast ${type}`; const iconClass = type === "success" ? "fa-check-circle" : "fa-exclamation-circle"; toast.innerHTML = `<i class="fas ${iconClass}"></i><span>${message}</span>`; container.appendChild(toast); setTimeout(() => toast.remove(), 4000); }
        function updateCartCount() { const cart = JSON.parse(localStorage.getItem('cart')) || []; const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0); const countElement = document.querySelector('.cart-item-count'); if (countElement) { countElement.textContent = totalItems; countElement.style.display = totalItems > 0 ? 'block' : 'none'; } }
        function formatPrice(productData) { if (!productData || typeof productData.price === 'undefined') return ''; let priceHTML = `<span class="current-price">Tk ${productData.price}</span>`; if (productData.comparePrice && productData.comparePrice > productData.price) { priceHTML += `<span class="compare-at-price">Tk ${productData.comparePrice}</span>`; } return priceHTML; }
        
        // --- Shared Component Loading ---
        async function loadSharedComponents() { const [storeDetailsSnap, navigationSnap, collectionsSnap] = await Promise.all([getDoc(doc(db, "settings", "store_details")), getDoc(doc(db, "navigation", "main-menu")), getDocs(collection(db, "collections"))]); if (storeDetailsSnap.exists()) { const data = storeDetailsSnap.data(); const logoLink = document.getElementById('store-logo-link'); if (data.logoUrl) { logoLink.innerHTML = `<img src="${data.logoUrl}" alt="${data.storeName || 'Store Logo'}">`; } else if (data.storeName) { logoLink.innerHTML = `<span class="store-name">${data.storeName}</span>`; } document.getElementById('footer-store-name').textContent = data.storeName || 'Sundorica'; renderSocialLinks(data.socialLinks); } const collectionSlugMap = new Map(); if (!collectionsSnap.empty) { collectionsSnap.forEach(doc => { const data = doc.data(); if (data.name && data.slug) collectionSlugMap.set(data.name, data.slug); }); } if (navigationSnap.exists()) { const menuData = navigationSnap.data(); if (menuData.items) { const navContainer = document.getElementById('main-nav'); const mobileNavContainer = document.getElementById('mobile-nav-links'); const ul = document.createElement('ul'); const mobileUl = document.createElement('ul'); createMenuItems(menuData.items, ul, collectionSlugMap); createMenuItems(menuData.items, mobileUl, collectionSlugMap); navContainer.innerHTML = ''; navContainer.appendChild(ul); mobileNavContainer.innerHTML = ''; mobileNavContainer.appendChild(mobileUl); addMenuEventListeners(); } } }
        function createMenuItems(items, parentUl, slugMap) { items.forEach(item => { const li = document.createElement('li'); let finalLink = item.link || '#'; if (item.type === 'collection' && slugMap.has(item.name)) { finalLink = `/collections/${slugMap.get(item.name)}`; } let linkHTML = `<a href="${finalLink}">${item.name}`; if (item.children && item.children.length > 0) { li.classList.add('has-submenu'); linkHTML += ` <i class="fas fa-chevron-down"></i>`; } linkHTML += `</a>`; li.innerHTML = linkHTML; if (item.children && item.children.length > 0) { const subUl = document.createElement('ul'); subUl.className = 'submenu'; createMenuItems(item.children, subUl, slugMap); li.appendChild(subUl); } parentUl.appendChild(li); }); }
        function renderSocialLinks(links) { const container = document.getElementById('social-links'); if (!links || !container) return; let html = ''; if (links.facebook) html += `<a href="${links.facebook}" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook-f"></i></a>`; if (links.instagram) html += `<a href="${links.instagram}" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>`; container.innerHTML = html; }

        // --- Product Details Logic ---
        let currentSelections = {};
        function addProductSchema(product, pagePath) { const existingSchema = document.querySelector('script[type="application/ld+json"]'); if (existingSchema) existingSchema.remove(); if (!product) return; const schema = { "@context": "https://schema.org/", "@type": "Product", name: product.name, image: product.imageUrls || [], description: product.description, sku: product.id, offers: { "@type": "Offer", url: `https://www.sundorica.com${pagePath}`, priceCurrency: "BDT", price: product.price, availability: (product.quantity > 0 || (product.variants && product.variants.some(v => v.quantity > 0))) ? "https://schema.org/InStock" : "https://schema.org/OutOfStock", seller: { "@type": "Organization", name: "Sundorica" } } }; const script = document.createElement('script'); script.type = "application/ld+json"; script.textContent = JSON.stringify(schema); document.head.appendChild(script); }
        
        function renderProductDetails(product, pagePath) {
            const container = document.getElementById("product-details-container");
            if (!product || product.status !== 'active') {
                container.innerHTML = "<h2>Product Not Found</h2><p>This product might be out of stock or no longer available.</p>";
                document.title = "Product Not Found - Sundorica";
                return;
            }

            // =================================================================
            // >> SEO IMPROVEMENT: DYNAMIC META DESCRIPTION ADDED <<
            // =================================================================
            let metaDescriptionTag = document.querySelector('meta[name="description"]');
            if (!metaDescriptionTag) {
                metaDescriptionTag = document.createElement('meta');
                metaDescriptionTag.setAttribute('name', 'description');
                document.head.appendChild(metaDescriptionTag);
            }
            const descriptionText = product.description ? product.description.replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim() : `Buy ${product.name} from Sundorica.`;
            const shortDescription = descriptionText.length > 155 ? descriptionText.substring(0, 152) + '...' : descriptionText;
            metaDescriptionTag.setAttribute('content', shortDescription);
            // =================================================================

            const existingCanonical = document.querySelector("link[rel='canonical']");
            if (existingCanonical) existingCanonical.remove();
            const canonicalLink = document.createElement('link');
            canonicalLink.rel = 'canonical';
            canonicalLink.href = `https://www.sundorica.com${pagePath}`;
            document.head.appendChild(canonicalLink);

            addProductSchema(product, pagePath);
            if (typeof fbq === 'function') { fbq('track', 'ViewContent', { content_name: product.name, content_ids: [product.id], content_type: 'product', value: product.price, currency: 'BDT' }); }

            const availableVariants = (product.variants || []).filter(v => v.quantity > 0);
            const hasVariants = product.variants && product.variants.length > 0;
            if (hasVariants && availableVariants.length === 0) {
                 container.innerHTML = "<h2>Product Out of Stock</h2><p>This product is currently unavailable.</p>";
                 return;
            }

            document.title = `${product.name || "Product"} - Sundorica`;

            let galleryHTML = '', thumbnailsHTML = '';
            if (product.imageUrls && product.imageUrls.length > 0) {
                galleryHTML = `<a id="main-image-link" href="${product.imageUrls[0]}"><img src="${product.imageUrls[0]}" alt="${product.name || "Product Image"}" id="main-product-image"></a>`;
                if (product.imageUrls.length > 1) {
                    thumbnailsHTML = product.imageUrls.map((img, index) => `<a href="${img}" class="thumbnail-link ${index === 0 ? 'active' : ''}"><img src="${img}" alt="Product thumbnail ${index + 1}" loading="lazy"></a>`).join('');
                }
            } else {
                galleryHTML = `<img src="https://placehold.co/800x1000/eee/ccc?text=No+Image" alt="No Image available">`;
            }
            
            let variantsHTML = '';
            if (hasVariants) {
                const optionKeys = Object.keys(product.variants[0]).filter(key => !['price', 'comparePrice', 'id', 'quantity', 'sku'].includes(key));
                variantsHTML = optionKeys.map(key => {
                    const options = [...new Set(product.variants.map(v => v[key]))];
                    const optionButtons = options.map(val => `<button class="variant-btn" data-option-name="${key}" data-option-value="${val}">${val}</button>`).join('');
                    const label = key.charAt(0).toUpperCase() + key.slice(1);
                    return `<div class="variant-selector" data-variant-group="${key}"><span class="variant-label">${label}:</span><div class="variant-options">${optionButtons}</div></div>`;
                }).join('');
            }

            const sizeChartHTML = product.sizeChartContent ? '<span class="size-chart-link" id="open-size-chart"><i class="fas fa-ruler-horizontal"></i> Size Chart</span>' : '';

            container.innerHTML = `
                <div class="product-details-layout">
                    <div class="product-gallery">
                        <div class="main-image">${galleryHTML}</div>
                        <div class="thumbnail-images">${thumbnailsHTML}</div>
                    </div>
                    <div class="product-info-details">
                        <h1 class="product-name">${product.name || "No Name"}</h1>
                        <div class="product-price">${formatPrice(product)}</div>
                        <div id="variant-container">${variantsHTML}</div>
                        ${sizeChartHTML}
                        <div class="action-buttons">
                             <button class="add-to-cart-btn">Add to Cart</button>
                             <button class="buy-now-btn">Buy It Now</button>
                        </div>
                        <div class="product-description">
                            <h3>Description</h3>
                            <div>${product.description ? product.description.replace(/\n/g, '<br>') : "No description available."}</div>
                        </div>
                    </div>
                </div>`;
            
            addProductDetailsEventListeners(product);
        }

        function addProductDetailsEventListeners(product) {
            const hasVariants = product.variants && product.variants.length > 0;
            const availableVariants = hasVariants ? product.variants.filter(v => v.quantity > 0) : [];
            const optionKeys = hasVariants && availableVariants.length > 0 ? Object.keys(product.variants[0]).filter(key => !['price', 'comparePrice', 'id', 'quantity', 'sku'].includes(key)) : [];
            
            currentSelections = {};
            optionKeys.forEach(key => currentSelections[key] = null);

            const addToCartBtn = document.querySelector('.add-to-cart-btn');
            const buyNowBtn = document.querySelector('.buy-now-btn');

            function updateButtonState() { if (!addToCartBtn || !buyNowBtn) return; let isAvailable = false; if (hasVariants) { const allOptionsSelected = optionKeys.every(key => currentSelections[key]); if (allOptionsSelected) { const selectedVariant = availableVariants.find(v => optionKeys.every(key => v[key] === currentSelections[key])); if (selectedVariant) isAvailable = true; } } else if (product.quantity > 0) { isAvailable = true; } addToCartBtn.disabled = !isAvailable; buyNowBtn.disabled = !isAvailable; }
            function updateVariantOptions() { let filteredVariants = [...availableVariants]; for (let i = 0; i < optionKeys.length; i++) { const key = optionKeys[i]; const group = document.querySelector(`.variant-selector[data-variant-group="${key}"]`); if (!group) continue; const availableOptions = [...new Set(filteredVariants.map(v => v[key]))]; if (i > 0 && !currentSelections[optionKeys[i - 1]]) { group.classList.add('hidden'); continue; } group.classList.remove('hidden'); group.querySelectorAll('.variant-btn').forEach(btn => btn.classList.toggle('hidden', !availableOptions.includes(btn.dataset.optionValue))); if (currentSelections[key]) { filteredVariants = filteredVariants.filter(v => v[key] === currentSelections[key]); } } }
            document.querySelectorAll('.variant-btn').forEach(button => { button.addEventListener('click', (e) => { const clickedButton = e.target; const optionName = clickedButton.dataset.optionName; const optionValue = clickedButton.dataset.optionValue; const optionIndex = optionKeys.indexOf(optionName); if (clickedButton.classList.contains('active')) { clickedButton.classList.remove('active'); currentSelections[optionName] = null; } else { clickedButton.closest('.variant-options').querySelectorAll('.variant-btn').forEach(btn => btn.classList.remove('active')); clickedButton.classList.add('active'); currentSelections[optionName] = optionValue; } for (let i = optionIndex + 1; i < optionKeys.length; i++) { const key = optionKeys[i]; currentSelections[key] = null; document.querySelector(`.variant-selector[data-variant-group="${key}"]`)?.querySelectorAll('.variant-btn').forEach(btn => btn.classList.remove('active')); } updateVariantOptions(); updateButtonState(); if (optionKeys.every(key => currentSelections[key])) { const selectedVariant = availableVariants.find(v => optionKeys.every(key => v[key] === currentSelections[key])); if (selectedVariant) document.querySelector('.product-price').innerHTML = formatPrice(selectedVariant); } else { document.querySelector('.product-price').innerHTML = formatPrice(product); } }); });
            document.querySelectorAll('.thumbnail-link').forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); const newSrc = link.href; document.getElementById('main-product-image').src = newSrc; document.getElementById('main-image-link').href = newSrc; document.querySelectorAll('.thumbnail-link').forEach(l => l.classList.remove('active')); link.classList.add('active'); }); });
            const mainImageLink = document.getElementById('main-image-link'); if (mainImageLink && product.imageUrls && product.imageUrls.length > 0 && typeof lightGallery === 'function') { mainImageLink.addEventListener('click', (e) => { e.preventDefault(); const items = product.imageUrls.map(img => ({ src: img, thumb: img })); const currentIndex = product.imageUrls.indexOf(mainImageLink.href); lightGallery(e.currentTarget, { dynamic: true, dynamicEl: items, index: currentIndex > -1 ? currentIndex : 0, plugins: [lgZoom, lgThumbnail], licenseKey: '0000-0000-000-0000', download: false, mobileSettings: { controls: true, showCloseIcon: true } }).openGallery(); }); }
            const sizeChartLink = document.getElementById('open-size-chart'); if (sizeChartLink) { const modal = document.getElementById('size-chart-modal'); const closeBtn = document.getElementById('modal-close-btn'); const closeModal = () => modal.classList.remove('active'); sizeChartLink.addEventListener('click', () => { document.getElementById('size-chart-content').innerHTML = product.sizeChartContent; modal.classList.add('active'); }); closeBtn.addEventListener('click', closeModal); modal.addEventListener('click', e => { if (e.target === modal) closeModal(); }); }
            
            function getSelectedProduct() { let itemToAdd = null; const pageUrl = `/product-details/${product.name.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '')}/${product.id}`; if (hasVariants) { if (!optionKeys.every(key => currentSelections[key])) { showToast('Please select all options', 'error'); return null; } const selectedVariant = availableVariants.find(v => optionKeys.every(key => v[key] === currentSelections[key])); if (!selectedVariant) { showToast('This combination is out of stock.', 'error'); return null; } const variantId = optionKeys.map(key => currentSelections[key]).join('-'); itemToAdd = { id: `${product.id}-${variantId}`, productId: product.id, name: product.name, price: selectedVariant.price, image: (product.imageUrls && product.imageUrls.length > 0) ? product.imageUrls[0] : '', variantDetails: { ...currentSelections }, quantity: 1, productPage: pageUrl }; } else { if (product.quantity <= 0) { showToast('This product is out of stock.', 'error'); return null; } itemToAdd = { id: product.id, productId: product.id, name: product.name, price: product.price, image: (product.imageUrls && product.imageUrls.length > 0) ? product.imageUrls[0] : '', quantity: 1, productPage: pageUrl }; } return itemToAdd; }
            
            if(addToCartBtn) addToCartBtn.addEventListener('click', () => { const item = getSelectedProduct(); if (!item) return; let cart = JSON.parse(localStorage.getItem('cart')) || []; const existingItemIndex = cart.findIndex(cartItem => cartItem.id === item.id); if (existingItemIndex > -1) { cart[existingItemIndex].quantity++; } else { cart.push(item); } localStorage.setItem('cart', JSON.stringify(cart)); showToast(`'${item.name}' has been added to cart`); if (typeof fbq === 'function') { fbq('track', 'AddToCart', { content_name: item.name, content_ids: [item.productId], content_type: 'product', value: item.price, currency: 'BDT' }); } updateCartCount(); });
            if(buyNowBtn) buyNowBtn.addEventListener('click', () => { const item = getSelectedProduct(); if (!item) return; let cart = JSON.parse(localStorage.getItem('cart')) || []; const existingItemIndex = cart.findIndex(cartItem => cartItem.id === item.id); if (existingItemIndex === -1) { cart.push(item); } else { cart[existingItemIndex].quantity++; } localStorage.setItem('cart', JSON.stringify(cart)); if (typeof fbq === 'function') { fbq('track', 'AddToCart', { content_name: item.name, content_ids: [item.productId], content_type: 'product', value: item.price, currency: 'BDT' }); } window.location.href = '/cart/'; });
            
            updateVariantOptions();
            updateButtonState();
        }

        async function loadProductDetails() {
            try {
                let pagePath = sessionStorage.getItem("originalPath");
                if (pagePath) {
                    sessionStorage.removeItem("originalPath");
                } else {
                    pagePath = window.location.pathname;
                }
                const pathParts = pagePath.split('/');
                const productId = pathParts[pathParts.length - 1];
                if (!productId) throw new Error("Product ID not found in URL.");
                
                const productSnap = await getDoc(doc(db, "products", productId));
                let productData = null;
                if (productSnap.exists()) {
                    productData = { id: productSnap.id, ...productSnap.data() };
                    if (productData.sizeChartId) {
                        const sizeChartSnap = await getDoc(doc(db, "pages", productData.sizeChartId));
                        if (sizeChartSnap.exists()) {
                            productData.sizeChartContent = sizeChartSnap.data().content;
                        }
                    }
                }
                renderProductDetails(productData, pagePath);
                window.history.replaceState(null, '', pagePath);
            } catch (error) {
                console.error("Error loading product details:", error);
                renderProductDetails(null, window.location.pathname);
            }
        }

        function setupEventListeners() { const handleSearch = () => { const desktopValue = document.getElementById('desktopSearchInput').value; const mobileValue = document.getElementById('mobileSearchInput').value; const searchTerm = (desktopValue || mobileValue).trim(); if (searchTerm) { window.location.href = `/all-products/?search=${encodeURIComponent(searchTerm)}`; } }; document.getElementById('desktopSearchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSearch(); }); document.getElementById('mobileSearchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSearch(); }); const desktopSearchTrigger = document.getElementById('desktop-search-trigger'); const closeDesktopSearchBtn = document.querySelector('.close-desktop-search-btn'); if(desktopSearchTrigger) desktopSearchTrigger.addEventListener('click', (e) => { e.preventDefault(); document.body.classList.add('desktop-search-active'); document.getElementById('desktopSearchInput').focus(); }); if(closeDesktopSearchBtn) closeDesktopSearchBtn.addEventListener('click', () => document.body.classList.remove('desktop-search-active')); const mobileSearchIcon = document.getElementById('mobile-search-icon'); const closeSearchBtn = document.querySelector('.close-search-btn'); if(mobileSearchIcon) mobileSearchIcon.addEventListener('click', (e) => { e.preventDefault(); document.body.classList.add('search-active'); document.getElementById('mobileSearchInput').focus(); }); if(closeSearchBtn) closeSearchBtn.addEventListener('click', () => document.body.classList.remove('search-active')); const mobileMenuToggle = document.querySelector('.mobile-menu-toggle'); const mobileNavPanel = document.getElementById('mobile-nav-panel'); const closeMobileNav = document.querySelector('.close-mobile-nav'); const overlay = document.getElementById('overlay'); const closeMenu = () => { mobileNavPanel.classList.remove('active'); overlay.classList.remove('active'); }; if(mobileMenuToggle) mobileMenuToggle.addEventListener('click', () => { mobileNavPanel.classList.add('active'); overlay.classList.add('active'); }); if(closeMobileNav) closeMobileNav.addEventListener('click', closeMenu); if(overlay) overlay.addEventListener('click', closeMenu); }
        function addMenuEventListeners(){ document.querySelectorAll('.main-nav .has-submenu > a, .mobile-nav-panel .has-submenu > a').forEach(menu => { menu.addEventListener('click', function(event) { event.preventDefault(); this.parentElement.classList.toggle('active'); }); }); }
        
        // --- Page Initialization ---
        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById('copyright-year').textContent = new Date().getFullYear();
            setupEventListeners();
            updateCartCount();

            // Load shared components and product details in parallel
            await Promise.all([
                loadSharedComponents(),
                loadProductDetails()
            ]);
            
            document.querySelector('.main-footer').style.display = 'block';
        });
    </script>
</body>
