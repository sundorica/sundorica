    <style>
        :root{--primary-color:#1a1a1a;--secondary-color:#666666;--accent-color:#007bff;--background-color:#ffffff;--surface-color:#f8f9fa;--border-color:#e9ecef;--danger-color:#dc3545}html{height:100%}body{font-family:Inter,sans-serif;margin:0;background-color:var(--background-color);color:var(--primary-color);line-height:1.6;display:flex;flex-direction:column;min-height:100vh}main{flex-grow:1}.container{width:100%;max-width:100%;margin:0 auto;padding-left:20px;padding-right:20px;box-sizing:border-box}section{padding:40px 0}.section-title{text-align:center;font-size:28px;margin-bottom:40px}.header-wrapper{position:sticky;top:0;z-index:100;background-color:var(--background-color);box-shadow:0 2px 4px rgba(0,0,0,.05)}.main-header{padding:15px 0}.header-content{display:flex;justify-content:space-between;align-items:center}.store-logo a{text-decoration:none;color:var(--primary-color)}.store-logo img{max-height:45px;display:block}.store-logo .store-name{font-family:Orbitron,sans-serif;font-size:22px;font-weight:700}.main-nav{display:none}@media (min-width:992px){.main-nav{display:block}}.main-nav ul{margin:0;padding:0;list-style:none;display:flex;gap:25px}.main-nav li{position:relative}.main-nav a{text-decoration:none;color:var(--primary-color);font-weight:500;display:flex;align-items:center;gap:5px;cursor:pointer}.has-submenu>a i{font-size:.7em;transition:transform .3s ease}.has-submenu.active>a i{transform:rotate(180deg)}.submenu{display:none;position:absolute;top:100%;left:0;background-color:#fff;list-style:none;padding:10px 0;margin-top:10px;min-width:200px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);border:1px solid var(--border-color);opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease;pointer-events:none;z-index:10}.main-nav .has-submenu.active>.submenu{display:block;opacity:1;transform:translateY(0);pointer-events:auto}.submenu li{padding:0 15px}.submenu a{padding:8px 0;width:100%}.header-icons{display:flex;align-items:center;gap:15px;font-size:20px}.header-icons a{color:var(--primary-color)}.cart-icon-link{position:relative;display:inline-block}.cart-item-count{position:absolute;top:-8px;right:-12px;background-color:var(--danger-color);color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;font-weight:700;line-height:1;display:none}.mobile-menu-toggle{display:none;font-size:24px;cursor:pointer}.desktop-search-header,.mobile-search-header{display:none;align-items:center;padding:15px 0;width:100%}.desktop-search-header .search-icon,.mobile-search-header .search-icon{padding:0 10px;font-size:20px;color:var(--secondary-color)}.desktop-search-header input,.mobile-search-header input{flex-grow:1;border:none;outline:0;font-size:16px}.desktop-search-header .close-desktop-search-btn,.mobile-search-header .close-search-btn{background:0 0;border:none;font-size:24px;cursor:pointer;padding:0 10px}body.desktop-search-active .header-content,body.search-active .header-content{display:none}body.search-active .mobile-search-header{display:flex}@media (min-width:992px){#mobile-menu-toggle,#mobile-search-icon{display:none}#desktop-search-trigger{display:inline-block}body.desktop-search-active .desktop-search-header{display:flex}}@media (max-width:991px){.main-nav{display:none}.mobile-menu-toggle{display:block}#desktop-search-trigger{display:none}}.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}@media (min-width:769px){.product-grid{grid-template-columns:repeat(4,1fr)}}@media (min-width:1200px){.product-grid{grid-template-columns:repeat(5,1fr)}}.product-card{text-decoration:none;color:var(--primary-color)}.product-image-container{aspect-ratio:4/5;overflow:hidden;border-radius:8px;background-color:var(--surface-color);position:relative}.product-card img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease,opacity .4s ease;position:absolute;top:0;left:0}.product-card .img-secondary{opacity:0}.product-card:hover .img-primary{opacity:0}.product-card:hover .img-secondary{opacity:1;transform:scale(1.05)}.product-info{padding:15px 5px;text-align:center}.product-name{font-weight:600;margin-bottom:5px;font-size:14px;}.product-price{font-weight:500;display:flex;justify-content:center;align-items:center;gap:8px;font-size:14px;}.compare-at-price{text-decoration:line-through;color:var(--danger-color);font-size:.9em}.off-badge{position:absolute;top:10px;right:10px;background-color:var(--danger-color);color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600;z-index:2}.main-footer{background-color:var(--surface-color);padding:5px 0;border-top:.5px solid var(--border-color);text-align:center;display:none}.social-links{margin-bottom:10px}.social-links a{font-size:12px;color:var(--secondary-color);margin:0 6px}.copyright{font-size:8px;color:var(--secondary-color)}.mobile-nav-panel{position:fixed;top:0;right:-100%;width:80%;max-width:300px;height:100%;background-color:#fff;z-index:102;transition:right .4s ease-in-out;padding:20px;box-sizing:border-box;box-shadow:-2px 0 10px rgba(0,0,0,.1);overflow-y:auto}.mobile-nav-panel.active{right:0}.mobile-nav-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;border-bottom:1px solid var(--border-color)}.mobile-nav-header h3{margin:0}.close-mobile-nav{font-size:24px;cursor:pointer}.mobile-nav-panel ul{list-style:none;padding:0;margin:20px 0 0 0}.mobile-nav-panel li{border-bottom:1px solid var(--border-color)}.mobile-nav-panel a{display:flex;justify-content:space-between;align-items:center;padding:15px 0;text-decoration:none;color:var(--primary-color);font-weight:500}.mobile-nav-panel .submenu{display:block;position:static;opacity:1;transform:none;pointer-events:auto;box-shadow:none;border:none;margin:0;min-width:unset;background-color:transparent;list-style:none;padding-left:20px;padding-top:0;padding-bottom:0;max-height:0;overflow:hidden;transition:max-height .4s ease-in-out}.mobile-nav-panel .has-submenu.active>.submenu{max-height:500px}.mobile-nav-panel .has-submenu>a i{transition:transform .3s ease}.mobile-nav-panel .has-submenu.active>a i{transform:rotate(180deg)}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,.5);z-index:101;display:none}.overlay.active{display:block}
        
        /* OPTIMIZATION: Skeleton loader styles */
        .skeleton { background-color: #e0e0e0; border-radius: 4px; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { background-color: #e0e0e0; } 50% { background-color: #f0f0f0; } 100% { background-color: #e0e0e0; } }
        .product-card-skeleton .skeleton-img { width: 100%; aspect-ratio: 4 / 5; margin-bottom: 10px; }
        .product-card-skeleton .skeleton-text { height: 20px; width: 80%; margin: 0 auto 10px; }
        .product-card-skeleton .skeleton-price { height: 20px; width: 50%; margin: 0 auto; }
        #collection-title.skeleton { width: 40%; max-width: 300px; height: 35px; margin-left: auto; margin-right: auto; margin-bottom: 40px; }
    </style>
</head>
<body>
    <script>
        const loadMetaPixel = () => {
            const script = document.createElement('script');
            script.src = "/meta-pixel-config.js";
            script.defer = true;
            document.head.appendChild(script);
            
            const noscript = document.createElement('noscript');
            noscript.innerHTML = `<img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1475283116725734&ev=PageView&noscript=1" />`;
            document.body.appendChild(noscript);

            window.removeEventListener('scroll', loadMetaPixel, { passive: true });
            window.removeEventListener('mousedown', loadMetaPixel, { passive: true });
            window.removeEventListener('touchstart', loadMetaPixel, { passive: true });
        };
        window.addEventListener('scroll', loadMetaPixel, { once: true, passive: true });
        window.addEventListener('mousedown', loadMetaPixel, { once: true, passive: true });
        window.addEventListener('touchstart', loadMetaPixel, { once: true, passive: true });
    </script>

    <div class="header-wrapper">
        <header class="main-header">
            <div class="container header-content">
                <div class="store-logo">
                    <a href="/" id="store-logo-link"></a>
                </div>
                <nav class="main-nav" id="main-nav"></nav>
                <div class="header-icons">
                    <a href="#" id="desktop-search-trigger" aria-label="Search"><i class="fas fa-search"></i></a>
                    <a href="#" id="mobile-search-icon" aria-label="Search"><i class="fas fa-search"></i></a>
                    <a href="/cart/" class="cart-icon-link" aria-label="View Cart">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-item-count">0</span>
                    </a>
                    <div class="mobile-menu-toggle" aria-label="Open Menu">
                        <i class="fas fa-bars"></i>
                    </div>
                </div>
            </div>
            <div class="container desktop-search-header">
                <i class="fas fa-search search-icon"></i>
                <input id="desktopSearchInput" placeholder="Search this collection...">
                <button class="close-desktop-search-btn" aria-label="Close Search">&times;</button>
            </div>
            <div class="container mobile-search-header">
                <i class="fas fa-search search-icon"></i>
                <input id="mobileSearchInput" placeholder="Search this collection...">
                <button class="close-search-btn" aria-label="Close Search">&times;</button>
            </div>
        </header>
    </div>

    <div id="mobile-nav-panel" class="mobile-nav-panel">
        <div class="mobile-nav-header">
            <h3>Menu</h3>
            <span class="close-mobile-nav">&times;</span>
        </div>
        <div id="mobile-nav-links"></div>
    </div>
    <div id="overlay" class="overlay"></div>

    <main>
        <section class="container">
            <h2 class="section-title skeleton" id="collection-title"></h2>
            <div class="product-grid" id="product-grid">
                <script>
                    (function() {
                        const grid = document.getElementById('product-grid');
                        let skeletonHTML = '';
                        const skeletonCount = 10;
                        for (let i = 0; i < skeletonCount; i++) {
                            skeletonHTML += `
                                <div class="product-card-skeleton">
                                    <div class="skeleton skeleton-img"></div>
                                    <div class="skeleton skeleton-text"></div>
                                    <div class="skeleton skeleton-price"></div>
                                </div>
                            `;
                        }
                        grid.innerHTML = skeletonHTML;
                    })();
                </script>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="social-links" id="social-links"></div>
            <p class="copyright">&copy; <span id="copyright-year"></span> <span id="footer-store-name"></span>. All Rights Reserved.</p>
        </div>
    </footer>

    <script type="module">
        // Import necessary Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, doc, getDoc, limit } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBKK4FmXtcMniVv6_5-mFPBJICwEM5Dkzc",
            authDomain: "nasir-9102c.firebaseapp.com",
            projectId: "nasir-9102c",
            storageBucket: "nasir-9102c.firebasestorage.app",
            messagingSenderId: "182224792140",
            appId: "1:182224792140:web:42348e8b24f94cdf07e2e9",
            measurementId: "G-8R5J241MJM"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variable to hold all products of the current collection for filtering
        let allCollectionProducts = [];

        // --- Core Functions ---
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const countElement = document.querySelector(".cart-item-count");
            if (countElement) {
                countElement.textContent = totalItems;
                countElement.style.display = totalItems > 0 ? "block" : "none";
            }
        }

        // --- Shared Component Loading & Rendering ---
        function createMenuItems(items, parentUl, slugMap) {
            items.forEach(item => {
                const li = document.createElement("li");
                let finalLink = item.link || "#";
                if (item.type === 'collection' && slugMap.has(item.name)) {
                    finalLink = `/collections/${slugMap.get(item.name)}`;
                }
                
                let linkHTML = `<a href="${finalLink}">${item.name}`;
                if (item.children && item.children.length > 0) {
                    li.classList.add("has-submenu");
                    linkHTML += ' <i class="fas fa-chevron-down"></i>';
                }
                linkHTML += `</a>`;
                li.innerHTML = linkHTML;

                if (item.children && item.children.length > 0) {
                    const subUl = document.createElement("ul");
                    subUl.className = "submenu";
                    createMenuItems(item.children, subUl, slugMap);
                    li.appendChild(subUl);
                }
                parentUl.appendChild(li);
            });
        }

        function renderSocialLinks(links) {
            const container = document.getElementById("social-links");
            if (!links || !container) return;
            let html = '';
            if (links.facebook) html += `<a href="${links.facebook}" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook-f"></i></a>`;
            if (links.instagram) html += `<a href="${links.instagram}" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>`;
            if (links.twitter) html += `<a href="${links.twitter}" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a>`;
            if (links.youtube) html += `<a href="${links.youtube}" target="_blank" rel="noopener noreferrer"><i class="fab fa-youtube"></i></a>`;
            container.innerHTML = html;
        }

        async function loadSharedComponents() {
            const [storeDetailsSnap, navigationSnap, collectionsSnap] = await Promise.all([
                getDoc(doc(db, "settings", "store_details")),
                getDoc(doc(db, "navigation", "main-menu")),
                getDocs(collection(db, "collections"))
            ]);

            if (storeDetailsSnap.exists()) {
                const data = storeDetailsSnap.data();
                const logoLink = document.getElementById("store-logo-link");
                if (data.logoUrl) {
                    logoLink.innerHTML = `<img src="${data.logoUrl}" alt="${data.storeName || 'Store Logo'}">`;
                } else if (data.storeName) {
                    logoLink.innerHTML = `<span class="store-name">${data.storeName}</span>`;
                }
                document.getElementById("footer-store-name").textContent = data.storeName || 'Your Store';
                renderSocialLinks(data.socialLinks);
            }
            
            const collectionSlugMap = new Map();
            if (!collectionsSnap.empty) {
                collectionsSnap.forEach(doc => {
                    const data = doc.data();
                    if (data.name && data.slug) {
                        collectionSlugMap.set(data.name, data.slug);
                    }
                });
            }

            if (navigationSnap.exists()) {
                const menuData = navigationSnap.data();
                if (menuData.items) {
                    const navContainer = document.getElementById("main-nav");
                    const mobileNavContainer = document.getElementById("mobile-nav-links");
                    const ul = document.createElement("ul");
                    const mobileUl = document.createElement("ul");
                    
                    createMenuItems(menuData.items, ul, collectionSlugMap);
                    navContainer.innerHTML = "";
                    navContainer.appendChild(ul);
                    
                    createMenuItems(menuData.items, mobileUl, collectionSlugMap);
                    mobileNavContainer.innerHTML = "";
                    mobileNavContainer.appendChild(mobileUl);
                }
            }
        }
        
        // --- Collection Page Specific Logic ---
        function renderProducts(productsToRender) {
            const grid = document.getElementById("product-grid");
            grid.innerHTML = ""; // Clear existing skeletons or products

            if (productsToRender.length === 0) {
                grid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1;">No products found matching your search.</p>';
                return;
            }

            productsToRender.forEach(product => {
                const imageUrl1 = (product.imageUrls && product.imageUrls.length > 0) ? product.imageUrls[0] : 'https://placehold.co/400x600/eee/ccc?text=No+Image';
                const imageUrl2 = (product.imageUrls && product.imageUrls.length > 1) ? product.imageUrls[1] : imageUrl1;

                let priceHTML = `<span class="current-price">Tk ${product.price}</span>`;
                let badgeHTML = '';
                if (product.comparePrice && product.comparePrice > product.price) {
                    priceHTML += `<span class="compare-at-price">Tk ${product.comparePrice}</span>`;
                    const discount = Math.round(((product.comparePrice - product.price) / product.comparePrice) * 100);
                    badgeHTML = `<div class="off-badge">${discount}% OFF</div>`;
                }

                const cardLink = document.createElement("a");
                const productSlug = product.name.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '');
                cardLink.href = `/product-details/${productSlug}/${product.id}`;
                cardLink.className = "product-card";
                cardLink.innerHTML = `
                    <div class="product-image-container">
                        ${badgeHTML}
                        <img src="${imageUrl1}" alt="${product.name}" class="img-primary" loading="lazy">
                        <img src="${imageUrl2}" alt="${product.name}" class="img-secondary" loading="lazy">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${priceHTML}</div>
                    </div>`;
                grid.appendChild(cardLink);
            });
        }
        
        function addCollectionSeoTags(collectionData, pagePath, products) {
            const canonicalUrl = `https://www.sundorica.com${pagePath}`;

            let canonicalTag = document.querySelector("link[rel='canonical']");
            if (!canonicalTag) {
                canonicalTag = document.createElement("link");
                canonicalTag.rel = "canonical";
                document.head.appendChild(canonicalTag);
            }
            canonicalTag.href = canonicalUrl;

            let jsonLdScript = document.querySelector('script[type="application/ld+json"]');
            if (!jsonLdScript) {
                jsonLdScript = document.createElement("script");
                jsonLdScript.type = "application/ld+json";
                document.head.appendChild(jsonLdScript);
            }

            const schema = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "name": collectionData.name,
                "description": collectionData.description || `Explore the ${collectionData.name} collection at Sundorica.`,
                "url": canonicalUrl,
                "numberOfItems": products.length,
                "itemListElement": products.map((product, index) => ({
                    "@type": "ListItem",
                    "position": index + 1,
                    "item": {
                        "@type": "Product",
                        "url": `https://www.sundorica.com/product-details/${product.name.toLowerCase().replace(/\s+/g,"-").replace(/[^\w-]+/g,"")}/${product.id}`,
                        "name": product.name,
                        "image": product.imageUrls && product.imageUrls.length > 0 ? product.imageUrls[0] : "",
                        "offers": {
                            "@type": "Offer",
                            "priceCurrency": "BDT",
                            "price": product.price
                        }
                    }
                }))
            };
            jsonLdScript.textContent = JSON.stringify(schema);
        }

        async function loadCollectionProducts() {
            const titleElement = document.getElementById("collection-title");
            try {
                let pagePath = sessionStorage.getItem("originalPath") || window.location.pathname;
                if(sessionStorage.getItem("originalPath")) sessionStorage.removeItem("originalPath");

                const pathParts = pagePath.split('/');
                const collectionSlug = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
                if (!collectionSlug) throw new Error("Collection slug not found in URL.");
                
                const collectionsRef = collection(db, "collections");
                const qCollection = query(collectionsRef, where("slug", "==", collectionSlug), limit(1));
                const collectionSnap = await getDocs(qCollection);

                if (collectionSnap.empty) {
                    throw new Error(`Collection with slug '${collectionSlug}' not found.`);
                }
                
                const collectionData = collectionSnap.docs[0].data();
                const collectionName = collectionData.name;
                
                titleElement.classList.remove('skeleton');
                titleElement.textContent = collectionName;
                document.title = `${collectionName} - Sundorica`;
                window.history.replaceState(null, '', pagePath);

                if (typeof fbq === 'function') {
                    fbq('track', 'ViewCategory', {
                        content_name: collectionName,
                        content_category: collectionName
                    });
                }
                
                const productsRef = collection(db, "products");
                const qProducts = query(productsRef, where("collections", "array-contains", collectionName));
                const productSnap = await getDocs(qProducts);

                allCollectionProducts = productSnap.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .filter(p => p.status === 'active')
                    .sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                
                renderProducts(allCollectionProducts);
                addCollectionSeoTags(collectionData, pagePath, allCollectionProducts);

            } catch (error) {
                console.error("Error loading collection products:", error);
                titleElement.classList.remove('skeleton');
                titleElement.textContent = "Collection Not Found";
                document.getElementById("product-grid").innerHTML = `<p style="text-align: center; grid-column: 1 / -1;">${error.message}</p>`;
            }
        }

        // --- Event Listeners ---
        function addMenuEventListeners() {
            document.querySelectorAll(".main-nav .has-submenu > a, .mobile-nav-panel .has-submenu > a").forEach(menu => {
                menu.addEventListener('click', function(event) {
                    event.preventDefault();
                    this.parentElement.classList.toggle('active');
                });
            });
        }

        function setupEventListeners() {
            const handleSearch = (event) => {
                const searchTerm = event.target.value.toLowerCase().trim();
                
                if (typeof fbq === 'function' && searchTerm) {
                    fbq('track', 'Search', {
                        search_string: searchTerm,
                        content_category: document.getElementById('collection-title').textContent
                    });
                }

                const filteredProducts = allCollectionProducts.filter(product => 
                    product.name.toLowerCase().includes(searchTerm)
                );
                renderProducts(filteredProducts);
            };

            document.getElementById("desktopSearchInput").addEventListener("input", handleSearch);
            document.getElementById("mobileSearchInput").addEventListener("input", handleSearch);
            
            document.getElementById("desktop-search-trigger").addEventListener('click', (e) => { e.preventDefault(); document.body.classList.add("desktop-search-active"); });
            document.querySelector(".close-desktop-search-btn").addEventListener('click', () => { document.body.classList.remove("desktop-search-active"); });
            
            document.getElementById("mobile-search-icon").addEventListener('click', (e) => { e.preventDefault(); document.body.classList.add("search-active"); });
            document.querySelector(".close-search-btn").addEventListener('click', () => { document.body.classList.remove("search-active"); });

            const mobileMenuToggle = document.querySelector(".mobile-menu-toggle");
            const mobileNavPanel = document.getElementById("mobile-nav-panel");
            const closeMobileNav = document.querySelector(".close-mobile-nav");
            const overlay = document.getElementById("overlay");
            const closeMenu = () => {
                mobileNavPanel.classList.remove("active");
                overlay.classList.remove("active");
            };
            mobileMenuToggle.addEventListener("click", () => {
                mobileNavPanel.classList.add("active");
                overlay.classList.add("active");
            });
            closeMobileNav.addEventListener("click", closeMenu);
            overlay.addEventListener("click", closeMenu);
        }

        // --- Page Initialization ---
        document.addEventListener("DOMContentLoaded", async () => {
            document.getElementById("copyright-year").textContent = new Date().getFullYear();
            
            // OPTIMIZATION: Load shared components and collection products in parallel
            await Promise.all([
                loadSharedComponents(),
                loadCollectionProducts()
            ]);

            document.querySelector(".main-footer").style.display = "block";
            addMenuEventListeners();
            setupEventListeners();
            updateCartCount();
        });
    </script>
</body>
</html>
