<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    // Page load howar shomoy je path-e user ashte cheyechilo, sheta dhore feli
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;

    // Ekti trick jate page-ti bar bar redirect na hoy
    const redirected = sessionStorage.getItem('redirected');
    if (!redirected) {
      sessionStorage.setItem('redirected', 'true');

      let destination = null;

      // Jodi URL-ti /collections/ diye shuru hoy
      if (path.startsWith('/collections/')) {
        // Tahole user-ke shorashori collection.html file-e pathiye daw
        destination = '/collection.html';
      } 
      // Jodi URL-ti /product-details/ diye shuru hoy
      else if (path.startsWith('/product-details/')) {
        // Tahole user-ke shorashori product-details.html file-e pathiye daw
        destination = '/product-details.html';
      }
      // Add other page redirects here if needed
      else if (path.startsWith('/cart')) {
          destination = '/cart.html';
      }
      else if (path.startsWith('/all-products')) {
          destination = '/all-products.html';
      }

      if (destination) {
        // Redirect to the actual file. The script on that page will read the original path.
        window.location.replace(destination + search + hash);
      }
    }
  </script>
</head>
<body>
  <p>Loading...</p>
</body>
</html>
