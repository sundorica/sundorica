<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loading...</title>
  <script type="text/javascript">
    // 1. Get the full path that caused the 404 error.
    const path = window.location.pathname;

    // 2. Store this path in sessionStorage. The correct page's script will read this.
    sessionStorage.setItem('originalPath', path);

    // 3. Determine the correct base HTML file to redirect to.
    let destination = '/'; // Default to homepage

    if (path.startsWith('/collections/') || path.startsWith('/collection/')) {
      destination = '/collection/'; 
    } else if (path.startsWith('/product-details/')) {
      destination = '/product-details/';
    } else if (path.startsWith('/cart')) {
      destination = '/cart/';
    } else if (path.startsWith('/all-products')) {
      destination = '/all-products/';
    }
    
    // 4. Redirect to the correct base HTML file.
    // The script on that page will handle loading the right content using the saved path.
    window.location.replace(destination);
  </script>
</head>
<body>
  <p>Please wait while we find your page...</p>
</body>
</html>
