<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // This script handles client-side routing for static sites like GitHub Pages.
        // It captures the path that caused a 404 error and redirects to the correct
        // HTML handler page, passing the intended path via sessionStorage.

        (function() {
            const path = window.location.pathname;
            
            // Define the base paths for your client-side routes.
            const routes = {
                '/product-details/': '/product-details/',
                '/collections/': '/collections/',
                '/cart/': '/cart/',
                // Add other client-side routes here if you have them
            };

            // Find which base route the path belongs to.
            const handlerRoute = Object.keys(routes).find(key => path.startsWith(key));

            if (handlerRoute) {
                // If it matches a known route (like a product page), save the original path.
                sessionStorage.setItem('originalPath', path);
                // Redirect to the actual HTML file that handles this route.
                window.location.href = routes[handlerRoute];
            } else {
                // If it's an unknown path, redirect to the homepage.
                window.location.href = '/';
            }
        })();
    </script>
</head>
<body>
    <p>If you are not redirected automatically, <a href="/">click here</a>.</p>
</body>
</html>
